name: Build and deploy GitHub Pages

on:
  workflow_dispatch:
    inputs:
      refresh_resources:
        description: "Refresh the static asset archive before building"
        required: true
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
  schedule:
    # Beijing time Monday and Friday 00:00. GitHub cron is UTC.
    - cron: "0 16 * * 0,4"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select static asset refresh mode
        run: |
          if [ "${{ github.event.inputs.refresh_resources }}" = "true" ]; then
            echo "REFRESH_ASSETS=true" >> "$GITHUB_ENV"
          else
            echo "REFRESH_ASSETS=false" >> "$GITHUB_ENV"
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Restore generated resources
        id: restore-resources
        uses: actions/cache/restore@v4
        with:
          path: |
            public/assets
            public/typst-ygo
            public/asset-manifest.json
          key: ygo-resources-${{ github.run_id }}-${{ github.run_attempt }}
          restore-keys: |
            ygo-resources-

      - name: Install dependencies
        run: npm ci

      - name: Sync upstream resources
        run: npm run sync:resources

      - name: Save generated resources
        if: env.REFRESH_ASSETS == 'true' || steps.restore-resources.outputs.cache-matched-key == ''
        uses: actions/cache/save@v4
        with:
          path: |
            public/assets
            public/typst-ygo
            public/asset-manifest.json
          key: ygo-resources-${{ github.run_id }}-${{ github.run_attempt }}

      - name: Build
        run: npm run build

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
